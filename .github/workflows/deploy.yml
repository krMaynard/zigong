name: Deploy to GitHub Pages

on:
  # Deploy on pushes to the default branch.
  push:
    branches: [main]
  # Allow manual runs from the Actions tab.
  workflow_dispatch:

# Allow this job to clone the repo and create a Pages deployment.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment, cancelling in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Build Astro site
        uses: withastro/action@v4
        # withastro/action installs deps, builds, and uploads the Pages artifact.
        env:
          # Baidu Maps key for the business-listing embed. Optional: if the
          # secret is unset, the build still succeeds and listings show a
          # "View on Baidu Maps" link instead of an interactive map.
          # Add it under Settings → Secrets and variables → Actions.
          PUBLIC_BAIDU_MAPS_AK: ${{ secrets.PUBLIC_BAIDU_MAPS_AK }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
